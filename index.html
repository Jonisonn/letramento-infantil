<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letramento Digital - IFMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --cor-primaria: #2c3e50;
            --cor-acerto: #27ae60;
            --cor-erro: #e74c3c;
            --cor-botao: #3498db;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border-bottom: 8px solid #bdc3c7;
        }

        .placar {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--cor-primaria);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        #icon-display {
            font-size: 120px;
            margin: 30px 0;
            color: var(--cor-primaria);
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-letra {
            font-size: 35px;
            font-weight: bold;
            padding: 20px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 20px;
            background-color: var(--cor-botao);
            color: white;
            transition: all 0.2s;
            width: 80px;
            box-shadow: 0 5px #2980b9;
        }

        .btn-letra:hover { transform: translateY(-3px); box-shadow: 0 8px #2980b9; }
        .btn-letra:active { transform: translateY(2px); box-shadow: 0 2px #2980b9; }

        #feedback {
            font-size: 1.3rem;
            margin-top: 25px;
            font-weight: bold;
            min-height: 30px;
        }

        .btn-reset {
            display: none;
            margin-top: 20px;
            padding: 15px 30px;
            background: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="placar">
        <span>Pontos: <span id="score">0</span></span>
        <span>Questão: <span id="round">1</span>/5</span>
    </div>

    <div id="icon-display">
        </div>

    <div id="opcoes"></div>

    <div id="feedback">Qual a letra inicial?</div>
    <button id="btn-reset" class="btn-reset" onclick="resetar()">Tentar Novamente</button>
</div>

<script>
    // Agora usamos classes do Font Awesome em vez de Emojis
    const bancoDeDados = [
        { l: 'A', icon: 'fa-apple-whole' },  // Maçã
        { l: 'B', icon: 'fa-basketball' },   // Bola
        { l: 'C', icon: 'fa-car' },          // Carro
        { l: 'D', icon: 'fa-dice' },         // Dado
        { l: 'E', icon: 'fa-envelope' },     // Envelope
        { l: 'F', icon: 'fa-fire' },         // Fogo
        { l: 'G', icon: 'fa-guitar' },       // Guitarra
        { l: 'H', icon: 'fa-helicopter' },   // Helicóptero
        { l: 'I', icon: 'fa-igloo' },        // Iglu
        { l: 'J', icon: 'fa-jet-fighter' }   // Jato
    ];

    let questoesAtuais = [];
    let index = 0;
    let pontos = 0;

    function iniciar() {
        pontos = 0;
        index = 0;
        document.getElementById('score').innerText = pontos;
        document.getElementById('btn-reset').style.display = 'none';
        document.getElementById('opcoes').style.display = 'block';
        
        // Embaralha e pega 5
        questoesAtuais = [...bancoDeDados].sort(() => Math.random() - 0.5).slice(0, 5);
        renderizar();
    }

    function renderizar() {
        if(index >= 5) {
            finalizar();
            return;
        }

        const q = questoesAtuais[index];
        document.getElementById('round').innerText = index + 1;
        document.getElementById('icon-display').innerHTML = `<i class="fa-solid ${q.icon}"></i>`;
        document.getElementById('feedback').innerText = "Qual a letra inicial?";
        document.getElementById('feedback').style.color = "#2c3e50";

        // Gerar botões
        const container = document.getElementById('opcoes');
        container.innerHTML = "";
        
        let letras = new Set([q.l]);
        while(letras.size < 3) {
            letras.add(bancoDeDados[Math.floor(Math.random()*10)].l);
        }

        [...letras].sort(() => Math.random() - 0.5).forEach(letra => {
            const btn = document.createElement('button');
            btn.className = 'btn-letra';
            btn.innerText = letra;
            btn.onclick = () => validar(letra, q.l);
            container.appendChild(btn);
        });
    }

    function validar(escolha, correta) {
        const f = document.getElementById('feedback');
        const btns = document.querySelectorAll('.btn-letra');
        btns.forEach(b => b.disabled = true);

        if(escolha === correta) {
            pontos++;
            document.getElementById('score').innerText = pontos;
            f.innerText = "Correto! 🌟";
            f.style.color = "#27ae60";
        } else {
            f.innerText = `Erro! Era a letra ${correta}`;
            f.style.color = "#e74c3c";
        }

        index++;
        setTimeout(renderizar, 1200);
    }

    function finalizar() {
        document.getElementById('icon-display').innerHTML = '<i class="fa-solid fa-trophy" style="color: #f1c40f;"></i>';
        document.getElementById('opcoes').style.display = 'none';
        document.getElementById('feedback').innerText = `Fim! Você acertou ${pontos} de 5!`;
        document.getElementById('btn-reset').style.display = 'inline-block';
    }

    function resetar() { iniciar(); }

    window.onload = iniciar;
</script>

</body>
</html>
