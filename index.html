<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Letras - Professor Jónison</title>
    <style>
        :root {
            --fundo: #FFDE59; /* Amarelo lúdico */
            --primaria: #FF5757; /* Vermelho suave */
            --secundaria: #5CE1E6; /* Azul claro */
            --acerto: #7ED957; /* Verde */
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background-color: var(--fundo);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #painel-jogo {
            background: white;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 15px 0px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 8px solid var(--secundaria);
        }

        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .placar-box {
            background: var(--secundaria);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .carta-principal {
            background: #f9f9f9;
            border: 4px dashed #ccc;
            border-radius: 30px;
            margin: 20px auto;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .opcoes-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .botao-letra {
            background: white;
            border: 4px solid var(--secundaria);
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primaria);
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 var(--secundaria);
        }

        .botao-letra:hover { transform: translateY(-3px); box-shadow: 0 9px 0 var(--secundaria); }
        .botao-letra:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--secundaria); }
        .botao-letra:disabled { opacity: 0.5; cursor: default; }

        #mensagem-feedback {
            font-size: 1.5rem;
            height: 40px;
            margin-top: 20px;
            color: var(--primaria);
            font-weight: bold;
        }

        .btn-reiniciar {
            display: none;
            background: var(--acerto);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 0 #58a73d;
            margin-top: 10px;
        }

        /* Animações */
        @keyframes balançar {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        .animar { animation: balançar 0.5s ease-in-out; }
    </style>
</head>
<body>

<div id="painel-jogo">
    <div class="cabecalho">
        <div class="placar-box">⭐ Pontos: <span id="pontos">0</span></div>
        <div style="font-weight: bold; color: #666;">Questão <span id="rodada">1</span> de 5</div>
    </div>

    <div class="carta-principal" id="carta">🍎</div>

    <div id="instrucao" style="font-size: 1.2rem; color: #444;">Com qual letra começa?</div>

    <div class="opcoes-container" id="container-letras">
        </div>

    <div id="mensagem-feedback"></div>
    <button class="btn-reiniciar" id="btn-reiniciar" onclick="resetarJogo()">Jogar Novamente!</button>
</div>

<script>
    // Banco de dados 100% lúdico e em português
    const dados = [
        { l: 'A', e: '🍍' }, // Abacaxi
        { l: 'B', e: '⚽' }, // Bola
        { l: 'C', e: '🏠' }, // Casa
        { l: 'D', e: '🎲' }, // Dado
        { l: 'E', e: '🐘' }, // Elefante
        { l: 'F', e: '🔥' }, // Fogo
        { l: 'G', e: '🐱' }, // Gato
        { l: 'H', e: '🚁' }, // Helicóptero
        { l: 'I', e: '🍦' }, // Iogurte / Ice (Sorvete) -> Melhor: ⛪ (Igreja) ou 🏝️ (Ilha)
        { l: 'J', e: '🚗' }  // Janela 🪟 ou Jacaré 🐊
    ];
    
    // Substituindo alguns para evitar confusão
    const bancoOriginal = [
        { l: 'A', e: '🍍', n: 'ABACAXI' },
        { l: 'B', e: '⚽', n: 'BOLA' },
        { l: 'C', e: '🏠', n: 'CASA' },
        { l: 'D', e: '🎲', n: 'DADO' },
        { l: 'E', e: '🐘', n: 'ELEFANTE' },
        { l: 'F', e: '🔪', n: 'FACA' },
        { l: 'G', e: '🐱', n: 'GATO' },
        { l: 'H', e: '🚁', n: 'HELICÓPTERO' },
        { l: 'I', e: '🏝️', n: 'ILHA' },
        { l: 'J', e: '🐊', n: 'JACARÉ' }
    ];

    let sorteio = [];
    let indice = 0;
    let pontos = 0;

    function iniciar() {
        pontos = 0;
        indice = 0;
        document.getElementById('pontos').innerText = pontos;
        document.getElementById('btn-reiniciar').style.display = 'none';
        document.getElementById('container-letras').style.display = 'grid';
        
        // Embaralha e seleciona 5 únicas
        sorteio = [...bancoOriginal].sort(() => Math.random() - 0.5).slice(0, 5);
        montarFase();
    }

    function montarFase() {
        if(indice >= 5) {
            finalizar();
            return;
        }

        const atual = sorteio[indice];
        document.getElementById('rodada').innerText = indice + 1;
        document.getElementById('carta').innerText = atual.e;
        document.getElementById('mensagem-feedback').innerText = "";
        
        const container = document.getElementById('container-letras');
        container.innerHTML = "";

        // Criar as 3 opções de letras
        let letrasOpcoes = new Set([atual.l]);
        while(letrasOpcoes.size < 3) {
            let aleat = bancoOriginal[Math.floor(Math.random()*bancoOriginal.length)].l;
            letrasOpcoes.add(aleat);
        }

        // Embaralhar botões e criar na tela
        [...letrasOpcoes].sort(() => Math.random() - 0.5).forEach(letra => {
            const btn = document.createElement('button');
            btn.className = 'botao-letra';
            btn.innerText = letra;
            btn.onclick = () => checar(letra, atual.l);
            container.appendChild(btn);
        });
    }

    function checar(escolha, correta) {
        const msg = document.getElementById('mensagem-feedback');
        const botoes = document.querySelectorAll('.botao-letra');
        botoes.forEach(b => b.disabled = true);

        if(escolha === correta) {
            pontos += 10;
            document.getElementById('pontos').innerText = pontos;
            msg.innerText = "MUITO BEM! 🌟";
            msg.style.color = "var(--acerto)";
            document.getElementById('carta').classList.add('animar');
        } else {
            msg.innerText = "QUASE! É A LETRA " + correta;
            msg.style.color = "var(--primaria)";
        }

        indice++;
        setTimeout(() => {
            document.getElementById('carta').classList.remove('animar');
            montarFase();
        }, 1500);
    }

    function finalizar() {
        document.getElementById('carta').innerText = "🏆";
        document.getElementById('instrucao').innerText = "Parabéns, campeão!";
        document.getElementById('container-letras').style.display = 'none';
        document.getElementById('mensagem-feedback').innerText = "Você fez " + pontos + " pontos!";
        document.getElementById('btn-reiniciar').style.display = 'inline-block';
    }

    function resetarJogo() {
        iniciar();
    }

    window.onload = iniciar;
</script>

</body>
</html>
